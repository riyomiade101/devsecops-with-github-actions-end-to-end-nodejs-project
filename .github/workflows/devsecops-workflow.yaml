name: Build code, run unit test, run SAST, SCA, DAST security scans for NodeJs App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write
  checks: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Run unit tests and SAST scan on the source code

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test --if-present
        continue-on-error: true

      - name: SonarQube Cloud Scan
        uses: sonarsource/sonarqube-scan-action@v4.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=riyomiade101
            -Dsonar.projectKey=riyomiade101_devsecops-with-github-actions-end-to-end-nodejs-project
            -Dsonar.sources=.
            -Dsonar.host.url=https://sonarcloud.io

  security:
    runs-on: ubuntu-latest
    needs: build
    name: Run the SCA scan on the source code

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  zap_scan:
    runs-on: ubuntu-latest
    needs: security
    name: Run DAST scan on the web application

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Start Node.js application
        run: |
          npm start &
          sleep 30

      - name: Check application is running
        run: |
          curl -I --max-time 30 http://localhost:3000

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:3000'
          cmd_options: '-a'
          allow_issue_writing: false